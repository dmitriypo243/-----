<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testogram</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
    --primary: #0088cc; /* Telegram синий */
    --primary-hover: #007ab8;
    --bg: #e5e5e5;
    --card: #ffffff;
    --text-main: #222222;
    --text-muted: #888888;
    --border: #d0d0d0;
    --radius: 12px;
    --shadow: rgba(0, 0, 0, 0.05);
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
    font-size: 16px;
}
        /* Тёмная тема */
body.dark {
    --primary: #1e90ff;
    --primary-hover: #1c7cd6;
    --bg: #121212;
    --card: #1e1e1e;
    --text-main: #e0e0e0;
    --text-muted: #aaaaaa;
    --border: #333333;
    --shadow: rgba(0, 0, 0, 0.7);
}

/* Хедер */
.top-nav {
    width: 100%;
    background: var(--card);
    padding: 12px 0;
    display: flex;
    justify-content: center;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 1px 3px var(--shadow);
}

.nav-content {
    width: 100%;
    max-width: 1200px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
    box-sizing: border-box;
}

.logo {
    font-weight: 700;
    font-size: 22px;
    color: var(--primary);
    letter-spacing: -0.5px;
}

/* Основная сетка */
.main-layout {
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    gap: 20px;
    width: 100%;
    max-width: 1200px;
    padding: 24px;
    box-sizing: border-box;
    align-items: start;
    min-height: calc(100vh - 60px);
}

/* Контейнеры */
.container {
    background: var(--card);
    padding: 20px;
    border-radius: var(--radius);
    box-shadow: 0 2px 8px var(--shadow);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
}

/* Профиль */
.user-card {
    text-align: center;
}
.user-avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 3px solid var(--bg);
    box-shadow: 0 4px 8px var(--shadow);
    object-fit: cover;
    margin: 0 auto 16px;
}

#userName {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--text-main);
}

.user-card p {
    color: var(--primary);
    font-weight: 600;
    font-size: 14px;
}

/* Список пользователей */
.user-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background-color 0.2s ease;
    font-weight: 500;
    font-size: 15px;
    color: var(--text-main);
}

.user-item:hover {
    background-color: #d7f0ff;
}

.user-item.active {
    background-color: var(--primary);
    color: white;
    font-weight: 700;
}

.user-item img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
}

/* Заголовки разделов */
.section-title {
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 20px;
    color: var(--text-main);
}

/* Feed и посты */
.post {
    background: var(--card);
    padding: 16px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 18px;
    box-shadow: 0 1px 4px var(--shadow);
}

.post-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.author-name {
    font-weight: 700;
    font-size: 16px;
    color: var(--primary);
}

.post-time {
    font-size: 13px;
    color: var(--text-muted);
}

.post-content {
    font-size: 15px;
    line-height: 1.5;
    margin-bottom: 12px;
    white-space: pre-wrap;
}

.post img {
    width: 100%;
    border-radius: 14px;
    margin-top: 10px;
    display: block;
}

/* Реакции */
.reactions {
    display: flex;
    gap: 12px;
    margin-top: 10px;
}

.react-btn {
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
    transition: color 0.2s ease;
}

.react-btn:hover {
    color: var(--primary);
}

/* Чат */
#chatMessages {
    height: 400px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px;
    background: var(--bg);
    border-radius: 14px;
    border: 1px solid #ccc;
    scrollbar-width: thin;
    scrollbar-color: var(--primary) transparent;
}

#chatMessages::-webkit-scrollbar {
    width: 8px;
}

#chatMessages::-webkit-scrollbar-thumb {
    background-color: var(--primary);
    border-radius: 10px;
}

.msg {
    padding: 10px 16px;
    border-radius: 18px;
    max-width: 75%;
    font-size: 14px;
    position: relative;
    word-wrap: break-word;
}

.msg-me {
    background: var(--primary);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}

.msg-them {
    background: var(--card);
    color: var(--text-main);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 3px var(--shadow);
}

/* Инпуты */
input[type="text"] {
    width: 100%;
    padding: 14px 18px;
    margin: 10px 0;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--card);
    font-family: inherit;
    font-size: 15px;
    transition: border-color 0.2s ease;
    box-sizing: border-box;
}

input[type="text"]:focus {
    border-color: var(--primary);
    outline: none;
    box-shadow: 0 0 0 3px rgba(0,136,204,0.2);
}

.btn-primary {
    background: var(--primary);
    color: white;
    border: none;
    padding: 14px;
    border-radius: var(--radius);
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.2s ease;
    width: 100%;
}

.btn-primary:hover {
    background: var(--primary-hover);
}

/* Контейнеры с фиксированной высотой для боковых панелей */
.sidebar, .chat-sidebar {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 96px);
    overflow-y: auto;
}

/* Адаптив */
@media (max-width: 1100px) {
    .main-layout {
        grid-template-columns: 1fr;
        max-width: 600px;
        padding: 16px;
    }
    .sidebar, .chat-sidebar {
        height: auto;
        max-height: 400px;
    }
}
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-content">
        <div class="logo">Testogram</div>
        <div id="authBox">
            <button id="loginBtn" class="btn-primary" style="width: auto; padding: 8px 24px;">Войти через Google</button>
            <div id="userInfo" style="display:none; align-items: center; gap: 16px;">
                <span id="navName" style="font-weight: 500; font-size: 14px;"></span>
                <button id="logoutBtn" style="background:none; border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;">Выйти</button>
                <button id="themeToggle" style="margin-left:16px; background:none; border:1px solid var(--border); padding:6px 12px; border-radius:8px; cursor:pointer; font-size:13px;">🌙 Тема</button>
            </div>
        </div>
    </div>
</div>

<div class="main-layout">
    <div class="sidebar">
        <div class="container user-card" id="myProfile" style="display:none; margin-bottom: 24px;">
            <img id="userPhoto" class="user-avatar" src="">
            <h3 id="userName" style="margin: 16px 0 4px; font-size: 18px;"></h3>
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 16px;">Online</p>
        </div>
        
        <div class="container">
            <div class="section-title">💬 Собеседники</div>
            <div id="userList">Загрузка...</div>
        </div>
    </div>

    <div class="feed-container">
        <div id="postForm" class="container" style="display:none; margin-bottom: 24px;">
            <div class="section-title">✨ Создать запись</div>
            <input type="text" id="contentInput" placeholder="Что у вас нового?">
            <input type="text" id="imageUrlInput" placeholder="Ссылка на фото (URL)">
            <button id="mainBtn" class="btn-primary">Опубликовать</button>
        </div>
        <div id="feed"></div>
    </div>

    <div class="chat-sidebar">
        <div id="chatBox" class="container" style="display:none; position: sticky; top: 84px;">
            <div class="section-title" id="chatHeader">Выберите чат</div>
            <div id="chatMessages"></div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="chatInput" placeholder="Сообщение..." style="margin: 0;">
                <button id="sendChatBtn" class="btn-primary" style="width: 50px; padding: 0;">🚀</button>
            </div>
        </div>
        <div id="chatPlaceholder" class="container" style="text-align: center; color: var(--text-muted); font-size: 14px;">
            Нажмите на пользователя слева, чтобы начать переписку
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// Твой обновленный конфиг
const firebaseConfig = {
  apiKey: "AIzaSyAf0A1w91_w-70y7LWfZWisIcaPEGqO69k",
  authDomain: "dmitriypo243.firebaseapp.com",
  projectId: "dmitriypo243",
  storageBucket: "dmitriypo243.firebasestorage.app",
  messagingSenderId: "969768074100",
  appId: "1:969768074100:web:91bdb2fd24f751c8c30a21",
  measurementId: "G-ZYBE3CYSJ8"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUID = null;
let activeChatUID = null;
let chatListener = null;

const getChatId = (u1, u2) => [u1, u2].sort().join("_");

const provider = new GoogleAuthProvider();
provider.setCustomParameters({ prompt: "select_account" });

document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, provider);
document.getElementById("logoutBtn").onclick = () => signOut(auth).then(() => location.reload());

onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUID = user.uid;
        await setDoc(doc(db, "users", user.uid), {
            uid: user.uid,
            name: user.displayName,
            photo: user.photoURL
        }, { merge: true });

        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("userInfo").style.display = "flex";
        document.getElementById("navName").innerText = user.displayName;
        document.getElementById("myProfile").style.display = "block";
        document.getElementById("userName").innerText = user.displayName;
        document.getElementById("userPhoto").src = user.photoURL;
        document.getElementById("postForm").style.display = "block";
        
        listenUsers();
    }
});

function listenUsers() {
    onSnapshot(collection(db, "users"), (snap) => {
        const list = document.getElementById("userList");
        list.innerHTML = "";
        snap.forEach(uDoc => {
            const user = uDoc.data();
            if (user.uid === currentUID) return;
            const el = document.createElement("div");
            el.className = `user-item ${activeChatUID === user.uid ? 'active' : ''}`;
            el.innerHTML = `<img src="${user.photo}"> <span>${user.name}</span>`;
            el.onclick = () => startChat(user);
            list.appendChild(el);
        });
    });
}

function startChat(targetUser) {
    activeChatUID = targetUser.uid;
    document.getElementById("chatPlaceholder").style.display = "none";
    document.getElementById("chatBox").style.display = "block";
    document.getElementById("chatHeader").innerText = `Чат с ${targetUser.name}`;
    
    if (chatListener) chatListener();
    const chatId = getChatId(currentUID, targetUser.uid);
    const q = query(collection(db, "conversations", chatId, "messages"), orderBy("timestamp"));
    
    chatListener = onSnapshot(q, (snap) => {
        const box = document.getElementById("chatMessages");
        box.innerHTML = "";
        snap.forEach(m => {
            const d = m.data();
            const isMe = d.from === currentUID;
            box.innerHTML += `<div class="msg ${isMe ? 'msg-me' : 'msg-them'}">${d.text}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });
    listenUsers();
}

document.getElementById("sendChatBtn").onclick = async () => {
    const text = document.getElementById("chatInput").value;
    if (!text || !activeChatUID) return;
    await addDoc(collection(db, "conversations", getChatId(currentUID, activeChatUID), "messages"), {
        from: currentUID,
        name: auth.currentUser.displayName,
        text: text,
        timestamp: serverTimestamp()
    });
    document.getElementById("chatInput").value = "";
};

document.getElementById("mainBtn").onclick = async () => {
    const text = document.getElementById("contentInput").value;
    const img = document.getElementById("imageUrlInput").value;
    if (!text && !img) return;
    await addDoc(collection(db, "requests"), {
        name: auth.currentUser.displayName,
        text: text || "",
        imageUrl: img || "",
        reactions: { like: 0, fire: 0, laugh: 0 },
        timestamp: serverTimestamp()
    });
    document.getElementById("contentInput").value = "";
    document.getElementById("imageUrlInput").value = "";
};

onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snap) => {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";
    snap.forEach(d => {
        const p = d.data();
        const id = d.id;
        feed.innerHTML += `
            <div class="post">
                <div class="post-header">
                    <span class="author-name">${p.name}</span>
                    <span class="post-time">${p.timestamp?.toDate().toLocaleTimeString() || ''}</span>
                </div>
                ${p.text ? `<div class="post-content">${p.text}</div>` : ''}
                ${p.imageUrl ? `<img src="${p.imageUrl}">` : ''}
                <div class="reactions">
                    <button class="react-btn" onclick="window.react('${id}','like')"><span>👍</span> <b>${p.reactions?.like || 0}</b></button>
                    <button class="react-btn" onclick="window.react('${id}','fire')"><span>🔥</span> <b>${p.reactions?.fire || 0}</b></button>
                    <button class="react-btn" onclick="window.react('${id}','laugh')"><span>😂</span> <b>${p.reactions?.laugh || 0}</b></button>
                </div>
            </div>`;
    });
});
    const themeToggle = document.getElementById("themeToggle");
themeToggle.onclick = () => {
    document.body.classList.toggle("dark");
    themeToggle.innerText = document.body.classList.contains("dark") ? "☀️ Светлая" : "🌙 Тема";
};

window.react = async (id, type) => {
    const docRef = doc(db, "requests", id);
    await updateDoc(docRef, { [`reactions.${type}`]: increment(1) });
};
</script>
</body>
</html>
